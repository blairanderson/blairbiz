---
layout: base
---

<div class="max-w-3xl mx-auto px-4 sm:px-6 py-12">
  {% if page.title %}
  <header class="mb-8">
    <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">{{ page.title | strip_html }}</h1>
    {% if page.subtitle %}
    <p class="mt-2 text-lg text-gray-600">{{ page.subtitle | strip_html }}</p>
    {% endif %}
  </header>
  {% endif %}

  <div class="prose max-w-none">
    {{ content }}
  </div>
</div>
