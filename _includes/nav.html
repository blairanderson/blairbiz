<nav class="border-b" style="border-color: var(--color-border);">
  <div class="max-w-[960px] mx-auto px-6">
    <div class="flex items-center justify-between h-16">
      <a href="{{ '/' | absolute_url }}" class="text-lg font-bold tracking-tight hover:opacity-70 transition-opacity" style="font-family: var(--font-body); color: var(--color-text);">
        {{ site.title }}
      </a>

      <!-- Mobile menu button -->
      <button type="button" id="mobile-menu-btn" class="sm:hidden inline-flex items-center justify-center p-2 rounded" style="color: var(--color-text-muted);" aria-expanded="false">
        <span class="sr-only">Open menu</span>
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path id="menu-open-icon" stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
          <path id="menu-close-icon" class="hidden" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Desktop nav -->
      <div class="hidden sm:flex sm:items-center sm:gap-6">
        {%- for link in site.navbar-links -%}
          <a href="{{ link[1] | relative_url }}" class="text-sm transition-colors" style="font-family: var(--font-body); color: var(--color-text-secondary);" onmouseover="this.style.color='var(--color-text)'" onmouseout="this.style.color='var(--color-text-secondary)'">{{ link[0] }}</a>
        {%- endfor -%}
      </div>
    </div>

    <!-- Mobile nav -->
    <div id="mobile-menu" class="hidden sm:hidden pb-4">
      <div class="flex flex-col gap-1">
        {%- for link in site.navbar-links -%}
          <a href="{{ link[1] | relative_url }}" class="block px-3 py-2 text-sm rounded transition-colors" style="font-family: var(--font-body); color: var(--color-text-secondary);">{{ link[0] }}</a>
        {%- endfor -%}
      </div>
    </div>
  </div>
</nav>

<script>
  document.getElementById('mobile-menu-btn').addEventListener('click', function() {
    var menu = document.getElementById('mobile-menu');
    var openIcon = document.getElementById('menu-open-icon');
    var closeIcon = document.getElementById('menu-close-icon');
    var expanded = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', !expanded);
    menu.classList.toggle('hidden');
    openIcon.classList.toggle('hidden');
    closeIcon.classList.toggle('hidden');
  });
</script>
