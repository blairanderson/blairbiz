---
layout: base
---

<div class="max-w-[720px] mx-auto px-6 py-12">
  {% if page.title %}
  <header class="mb-8">
    {% if page.subtitle %}
    <p class="section-label">{{ page.subtitle | strip_html }}</p>
    {% endif %}
    <h1 class="heading-display{% if page.subtitle %} mt-2{% endif %}">{{ page.title | strip_html }}</h1>
  </header>
  {% endif %}

  <div class="prose max-w-none">
    {{ content }}
  </div>
</div>
